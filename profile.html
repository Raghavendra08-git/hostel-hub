{% extends 'base.html' %}

{% block content %}
<div style="max-width: 450px; margin: 0 auto;">
    <div class="card">
        <div class="auth-box">
            <h2 style="text-align: center;">Welcome Back</h2>
            <br>

            <!-- Tabs -->
            <div style="display: flex; gap: 1rem; margin-bottom: 2rem; border-bottom: var(--glass-border);">
                <button onclick="showLogin()" id="tab-login" class="btn btn-secondary"
                    style="flex: 1; background: var(--primary);">Login</button>
                <button onclick="showRegister()" id="tab-register" class="btn btn-secondary"
                    style="flex: 1;">Register</button>
            </div>

            <!-- Login Form -->
            <form id="login-form" action="{{ url_for('login') }}" method="POST">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" required placeholder="Enter your username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required placeholder="Enter your password">
                </div>
                <button type="submit" class="btn" style="width: 100%;">Login to Dashboard</button>
            </form>

            <!-- Register Form -->
            <form id="register-form" action="{{ url_for('register') }}" method="POST" style="display: none;">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" required placeholder="john@example.com">
                </div>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" required placeholder="Choose a username">
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <select name="role">
                        <option value="student">Student</option>
                        <option value="warden">Warden</option>
                        <option value="hod">HOD</option>
                        <option value="principal">Principal</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required placeholder="Create a password">
                </div>
                <button type="submit" class="btn" style="width: 100%;">Create Account</button>
            </form>

        </div>
    </div>
</div>

<script>
    function showLogin() {
        document.getElementById('login-form').style.display = 'block';
        document.getElementById('register-form').style.display = 'none';
        document.getElementById('tab-login').style.background = 'var(--primary)';
        document.getElementById('tab-register').style.background = 'rgba(255,255,255,0.1)';
    }
    function showRegister() {
        document.getElementById('login-form').style.display = 'none';
        document.getElementById('register-form').style.display = 'block';
        document.getElementById('tab-login').style.background = 'rgba(255,255,255,0.1)';
        document.getElementById('tab-register').style.background = 'var(--primary)';
    }
</script>
{% endblock %}
